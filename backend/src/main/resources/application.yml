server:
  port: 8080

spring:
  application:
    name: healthy-diet-system-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/healthy_diet_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
app:
  jwt:
    secret: healthy-diet-local-dev-secret-change-me
    expire-minutes: 1440
  food-import:
    enabled: false
    exit-after-import: false
    file-path: ../中国食物成分表_四项营养版.xlsx
